<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нязик Тач — Digital Creator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1120;
      --card: #111827;
      --border: rgba(255,255,255,0.08);
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --sub: #64748b;
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      background: radial-gradient(ellipse at 30% 20%, #0f1f3d 0%, #080f1e 50%, #060b15 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 70%);
      top: -150px; left: -100px;
    }
    .blob-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(99,102,241,0.1), transparent 70%);
      bottom: -100px; right: -80px;
    }

    .page {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }

    /* ── card ── */
    .card {
      width: 100%; max-width: 560px;
      background: linear-gradient(145deg, #131f35, #0d1829);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 28px;
      padding: 36px 40px 36px 36px;
      display: flex;
      align-items: center;
      gap: 32px;
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.05),
        0 32px 80px rgba(0,0,0,0.7),
        0 0 80px rgba(59,130,246,0.06) inset;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── photo ── */
    .photo-col {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-wrap {
      position: relative;
      width: 148px; height: 186px;
    }
    .photo-ring {
      position: absolute; inset: -3px;
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(59,130,246,0.55), rgba(99,102,241,0.25), rgba(59,130,246,0.45));
    }
    .photo-img {
      position: relative;
      width: 100%; height: 100%;
      border-radius: 999px;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #0d1829;
      display: block;
    }

    /* ── info ── */
    .info-col { flex: 1; min-width: 0; }

    .name {
      font-size: clamp(1.65rem, 5vw, 2.15rem);
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 20px;
    }
    .subtitle em { font-style: normal; color: var(--accent2); opacity: 0.85; }

    /* features */
    .features {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 22px;
    }
    .feat {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.87rem;
      color: rgba(241,245,249,0.8);
    }
    .feat-icon {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent2);
    }
    .feat-icon svg {
      width: 15px; height: 15px;
      fill: none; stroke: currentColor;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* socials */
    .socials {
      display: flex; gap: 10px;
      margin-bottom: 18px;
    }
    .soc {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .soc:hover { transform: translateY(-3px) scale(1.12); }
    .soc svg { width: 17px; height: 17px; fill: currentColor; }

    .soc.tg:hover { color:#29b6f6; border-color:rgba(41,182,246,0.4);  box-shadow:0 6px 20px rgba(41,182,246,0.25); }
    .soc.ig:hover { color:#f472b6; border-color:rgba(244,114,182,0.4); box-shadow:0 6px 20px rgba(244,114,182,0.25); }
    .soc.tk:hover { color:#e5e5e5; border-color:rgba(229,229,229,0.3); box-shadow:0 6px 20px rgba(229,229,229,0.15); }
    .soc.yt:hover { color:#f87171; border-color:rgba(248,113,113,0.4); box-shadow:0 6px 20px rgba(248,113,113,0.25); }

    /* CTA */
    .cta {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 50px; border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 60%, #4f46e5 100%);
      background-size: 200% 200%;
      color: #fff;
      font-size: 0.95rem; font-weight: 600; letter-spacing: 0.02em;
      text-decoration: none; cursor: pointer;
      box-shadow: 0 4px 18px rgba(59,130,246,0.4);
      animation: ctaGrad 4s ease-in-out infinite alternate;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
      position: relative; overflow: hidden;
    }
    @keyframes ctaGrad {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .cta::before {
      content: '';
      position: absolute; top: -50%; left: -60%;
      width: 35%; height: 200%;
      background: rgba(255,255,255,0.18);
      transform: skewX(-22deg);
      animation: sheen 3s ease-in-out infinite;
    }
    @keyframes sheen { 0% { left: -60%; } 100% { left: 130%; } }
    .cta:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 10px 30px rgba(59,130,246,0.5); }
    .cta:active { transform: scale(0.98); }
    .cta svg { flex-shrink: 0; width: 17px; height: 17px; fill: currentColor; }

    @media (max-width: 500px) {
      .card {
        flex-direction: column; align-items: center;
        text-align: center; padding: 32px 24px; gap: 24px;
      }
      .socials { justify-content: center; }
      .photo-wrap { width: 128px; height: 160px; }
    }
  </style>
</head>
